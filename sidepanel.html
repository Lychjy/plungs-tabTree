<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabTree - Workspace Manager</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h18v18H3z"/>
          <path d="M3 9h18"/>
          <path d="M9 21V9"/>
        </svg>
        <span>TabTree</span>
      </div>
      <div class="header-actions">
        <button id="searchBtn" class="icon-btn" data-i18n-title="searchPlaceholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" data-i18n-title="settingsTitle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <!-- <button id="minimizeBtn" class="icon-btn" data-i18n-title="minimizePanel">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <path d="m14 15-3-3 3-3"/>
          </svg>
        </button> -->
      </div>
    </div>

    <!-- Search Bar -->
    <div id="searchContainer" class="search-container hidden">
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" />
      <button id="clearSearch" class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Workspace List -->
    <div class="workspaces-section">
      <div class="section-header">
        <h2 data-i18n="workspaces">Workspaces</h2>
        <button id="addWorkspaceBtn" class="icon-btn" data-i18n-title="enterWorkspaceName">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div id="workspaceList" class="workspace-list">
        <!-- Workspaces will be rendered here -->
      </div>
    </div>

    <!-- Current Tabs Tree -->
    <div class="tabs-section">
      <div class="section-header">
        <h2 data-i18n="currentTabs">Current Tabs</h2>
        <div class="tab-actions">
          <button id="collapseAllBtn" class="text-btn" data-i18n="collapse" data-i18n-title="collapse">Collapse</button>
          <button id="expandAllBtn" class="text-btn" data-i18n="expand" data-i18n-title="expand">Expand</button>
        </div>
      </div>
      <div id="tabsTree" class="tabs-tree">
        <!-- Tabs tree will be rendered here -->
      </div>
    </div>

    <!-- Stashed Tabs -->
    <div class="stashed-section">
      <div class="section-header">
        <h2 data-i18n="stashed">Stashed</h2>
        <button id="exportBtn" class="text-btn" data-i18n="export" data-i18n-title="export">Export</button>
        <button id="importBtn" class="text-btn" data-i18n="import" data-i18n-title="import">Import</button>
      </div>
      <div id="stashedList" class="stashed-list">
        <!-- Stashed snapshots will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Floating Ball for Minimized Panel -->
  <div id="floatingBall" class="floating-ball hidden">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 3h18v18H3z"/>
      <path d="M3 9h18"/>
      <path d="M9 21V9"/>
    </svg>
  </div>

  <!-- Context Menu -->
  <div id="contextMenu" class="context-menu hidden">
    <div class="menu-item" data-action="newTab" data-i18n="newTab">New Tab</div>
    <div class="menu-item" id="moveToWorkspaceMenuItem">
      <span data-i18n="moveTabTo">Move to Workspace</span>
      <div id="workspaceSubmenu" class="submenu"></div>
    </div>
    <div class="menu-divider"></div>
    <div class="menu-item" data-action="duplicate" data-i18n="duplicate">Duplicate</div>
    <div class="menu-item" data-action="pin" data-i18n="pin">Pin/Unpin</div>
    <div class="menu-divider"></div>
    <div class="menu-item" data-action="close" data-i18n="close">Close</div>
    <div class="menu-item" data-action="closeOthers" data-i18n="closeOthers">Close Others</div>
    <div class="menu-item" data-action="closeRight" data-i18n="closeRight">Close to Right</div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 data-i18n="settingsTitle">Settings</h3>
        <button id="closeSettings" class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="setting-item">
          <label>
            <input type="checkbox" id="autoCategorize" checked />
            <span data-i18n="settingAutoCategorize">Auto-categorize tabs by domain</span>
          </label>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="enableSync" checked />
            <span data-i18n="settingEnableSync">Enable cross-device sync</span>
          </label>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="showFavicons" checked />
            <span data-i18n="settingShowFavicons">Show favicons</span>
          </label>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="compactMode" />
            <span data-i18n="settingCompactMode">Compact mode</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
